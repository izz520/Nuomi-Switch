name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            rustTarget: x86_64-apple-darwin
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rustTarget: aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rustTarget: ''
          - platform: windows-latest
            args: ''
            rustTarget: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Tauri updater signing key
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          import sys

          key = os.environ.get("UPDATER_PRIVATE_KEY", "").strip()
          if not key:
              print("::error::Missing GitHub Secret: TAURI_SIGNING_PRIVATE_KEY")
              sys.exit(1)

          try:
              decoded = base64.b64decode(key, validate=True).decode("utf-8")
          except Exception:
              print("::error::TAURI_SIGNING_PRIVATE_KEY must be the exact one-line content of .tauri-signing/nuomi-switch.key.")
              sys.exit(1)

          first_line = decoded.splitlines()[0] if decoded.splitlines() else ""
          if "public key" in first_line:
              print("::error::TAURI_SIGNING_PRIVATE_KEY contains the public .key.pub value. Use .tauri-signing/nuomi-switch.key instead.")
              sys.exit(1)
          if "secret key" not in first_line:
              print("::error::TAURI_SIGNING_PRIVATE_KEY is not a valid Tauri updater secret key.")
              sys.exit(1)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"TAURI_SIGNING_PRIVATE_KEY={key}\n")
          PY

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Nuomi Switch ${{ github.ref_name }}
          releaseBody: See the assets below to download and install this version.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }} --config '{"bundle":{"createUpdaterArtifacts":true}}'
