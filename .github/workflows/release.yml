name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            rustTarget: x86_64-apple-darwin
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rustTarget: aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rustTarget: ''
          - platform: windows-latest
            args: ''
            rustTarget: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Tauri updater signing key
        shell: bash
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          node <<'JS'
          const fs = require('node:fs');

          const key = (process.env.UPDATER_PRIVATE_KEY || '').trim();
          if (!key) {
            console.error('::error::Missing GitHub Secret: TAURI_SIGNING_PRIVATE_KEY');
            process.exit(1);
          }

          if (!/^[A-Za-z0-9+/]+={0,2}$/.test(key) || key.length % 4 !== 0) {
            console.error('::error::TAURI_SIGNING_PRIVATE_KEY must be the exact one-line content of .tauri-signing/nuomi-switch.key.');
            process.exit(1);
          }

          const decoded = Buffer.from(key, 'base64').toString('utf8');
          const encodedAgain = Buffer.from(decoded, 'utf8').toString('base64');
          if (encodedAgain.replace(/=+$/, '') !== key.replace(/=+$/, '')) {
            console.error('::error::TAURI_SIGNING_PRIVATE_KEY is not valid base64 content from .tauri-signing/nuomi-switch.key.');
            process.exit(1);
          }

          const firstLine = decoded.split(/\r?\n/)[0] || '';
          if (firstLine.includes('public key')) {
            console.error('::error::TAURI_SIGNING_PRIVATE_KEY contains the public .key.pub value. Use .tauri-signing/nuomi-switch.key instead.');
            process.exit(1);
          }
          if (!firstLine.includes('secret key')) {
            console.error('::error::TAURI_SIGNING_PRIVATE_KEY is not a valid Tauri updater secret key.');
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, 'TAURI_SIGNING_PRIVATE_KEY=' + key + '\n', 'utf8');
          JS

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Nuomi Switch ${{ github.ref_name }}
          releaseBody: See the assets below to download and install this version.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }} --config '{"bundle":{"createUpdaterArtifacts":true}}'
